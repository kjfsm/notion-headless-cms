name: Changeset Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: changeset-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    runs-on: ubuntu-latest
    steps:
      # ラベル `skip-changeset` が付いた PR は後続ステップをスキップ
      # ジョブ全体を if でスキップすると "skipped" になりブランチ保護を通過できないため
      # ジョブは常に実行し、ステップレベルで制御する
      - name: スキップ判定
        id: skip
        run: |
          echo "result=${{ contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: steps.skip.outputs.result == 'false'
        with:
          # changeset の差分判定に必要
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        if: steps.skip.outputs.result == 'false'

      - uses: actions/setup-node@v6
        if: steps.skip.outputs.result == 'false'
        with:
          node-version: "24.x"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --prefer-offline
        if: steps.skip.outputs.result == 'false'

      - name: changeset 有無を確認
        if: steps.skip.outputs.result == 'false'
        run: |
          # packages/** に変更があるのに changeset が 0 件なら失敗させる
          changed_pkg=$(git diff --name-only origin/main...HEAD -- 'packages/*/src/**' 'packages/*/package.json' || true)
          changed_cs=$(git diff --name-only origin/main...HEAD -- '.changeset/*.md' | grep -v README.md || true)

          if [ -n "$changed_pkg" ] && [ -z "$changed_cs" ]; then
            echo "::error::packages/ に変更があるのに changeset が作成されていません。"
            echo "::error::pnpm changeset を実行するか、PR に skip-changeset ラベルを付けてください。"
            exit 1
          fi

          # changeset が正しく読めるか（壊れた frontmatter を検出）
          pnpm changeset status --since=origin/main
