name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm のバージョンは package.json の packageManager フィールドから自動検出させる
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm lint
      - run: pnpm knip

  verify:
    # build / typecheck / test:coverage / publint / attw を turbo 1 コマンドで並列実行。
    # test:coverage は vitest --coverage で lcov を生成するため、別ジョブを立てずに
    # 同一ランで codecov アップロードまで完結させ、install / build / test の重複を排除。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      # PR では read-only で restore のみ、main push 時のみ save する。
      # GitHub キャッシュサービスの transient 5xx によって post-job の save 処理が
      # 数分リトライし続ける事象を PR 側で避ける ([actions/toolkit#1107] 等)。
      # main のキャッシュは後続の PR / main 実行が restore-keys でヒットできる。
      - uses: actions/cache/restore@v5
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref }}-
            ${{ runner.os }}-turbo-refs/heads/main-
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm verify:ci
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false
      - uses: actions/cache/save@v5
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ github.sha }}
