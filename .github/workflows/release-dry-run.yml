name: Release Dry Run

# changesets/action が作る Version Packages PR (ブランチ名 `changeset-release/<base>`) に対して、
# npm publish --dry-run を実行し、tarball への dist 同梱・provenance 設定・バージョン整合性を
# マージ前に検証する。通常の feature PR では走らない (ci.yml の verify でカバー済み)。

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run:
    if: startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # pnpm のバージョンは package.json の packageManager フィールドから自動検出させる
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref }}-
            ${{ runner.os }}-turbo-refs/heads/main-
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile --prefer-offline

      # prepublishOnly で dist が再生成されるが、turbo キャッシュを活かして CI を速く保つため事前ビルド
      - run: pnpm turbo build --filter="./packages/*"

      # 各公開パッケージを dry-run publish。dist 欠落・名前衝突・provenance 不備などを検知
      - run: pnpm -r --filter="./packages/*" publish --dry-run --no-git-checks
