name: Release Dry Run

# changesets/action が作る Version Packages PR (ブランチ名 `changeset-release/<base>`) に対して
# `pnpm publish --dry-run` を実行し、バージョン衝突 / npm 認証 / provenance OIDC 署名の可否 /
# tarball の dist 同梱を publish 直前に検証する。
#
# feature PR では ci.yml の verify が publint + attw で tarball パッケージング整合性を検証済み。
# ここは publish 固有の観点 (認証・provenance・衝突) を Version PR 段階で押さえる二層目。

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # publishConfig.provenance: true のパッケージが OIDC で provenance 署名の可否を
  # 検証するため、release.yml と同じく id-token 権限を付与する
  id-token: write

jobs:
  dry-run:
    if: startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # pnpm のバージョンは package.json の packageManager フィールドから自動検出させる
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          # cache: "pnpm" は restore-keys が設定できず lockfile 変更で完全ミスになるため使わない

      - name: pnpm store パスを取得
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      # Version PR 専用ジョブのため常に PR 文脈で走る。save は行わず restore のみ。
      - uses: actions/cache/restore@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/cache/restore@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref }}-
            ${{ runner.os }}-turbo-refs/heads/main-
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile --prefer-offline

      # dry-run publish 前に dist を用意。turbo キャッシュが効くので main と共有されていれば高速
      - run: pnpm turbo build --filter="./packages/*"

      # 各公開パッケージを dry-run publish。バージョン衝突・provenance OIDC・認証を検知
      - run: pnpm -r --filter="./packages/*" publish --dry-run --no-git-checks
