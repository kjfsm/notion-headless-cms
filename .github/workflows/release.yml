name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # GitHub App トークンを発行して changesets/action に渡す。
      # デフォルトの GITHUB_TOKEN で作成した PR / push は他ワークフロー (ci.yml / release-dry-run.yml)
      # を起動しない仕様のため、App トークン経由で作成することで Version Packages PR 上でも
      # CI と publish --dry-run が走るようにする。
      - name: App トークン発行
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # changesets/action の git push が App 資格で行われるようにする
          token: ${{ steps.app-token.outputs.token }}

      # pnpm のバージョンは package.json の packageManager フィールドから自動検出させる
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      # CI でビルド済みの turbo キャッシュを引き継いで高速化
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-refs/heads/main-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-refs/heads/main-

      - run: pnpm install --frozen-lockfile --prefer-offline
      # publish 時に dist が必要なので build のみ実施。typecheck / test は CI で通過済み前提
      - run: pnpm turbo build --filter="./packages/*"

      - name: バージョン更新PRの作成 または npm 公開
        uses: changesets/action@v1
        with:
          publish: "pnpm release"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance を有効化（permissions.id-token: write と連動）
          NPM_CONFIG_PROVENANCE: "true"
