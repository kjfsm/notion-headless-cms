name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # デフォルトの GITHUB_TOKEN で作成した PR は他ワークフロー (release-dry-run.yml など)
          # を起動しない仕様のため、PAT 経由で checkout / changesets/action を動かす。
          # これにより Version Packages PR 上でも publish --dry-run が走る。
          # 公式: https://github.com/changesets/action#with-publishing
          token: ${{ secrets.RELEASE_PAT }}

      # pnpm のバージョンは package.json の packageManager フィールドから自動検出させる
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          # cache: "pnpm" は restore-keys が設定できず lockfile 変更で完全ミスになるため使わない

      - name: pnpm store パスを取得
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # CI でビルド済みの turbo キャッシュを引き継いで高速化
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-refs/heads/main-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-refs/heads/main-

      - run: pnpm install --frozen-lockfile --prefer-offline
      # publish 時に dist が必要なので build のみ実施。typecheck / test は CI で通過済み前提
      - run: pnpm turbo build --filter="./packages/*"

      - name: バージョン更新PRの作成 または npm 公開
        uses: changesets/action@v1
        with:
          publish: "pnpm release"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance を有効化（permissions.id-token: write と連動）
          NPM_CONFIG_PROVENANCE: "true"
