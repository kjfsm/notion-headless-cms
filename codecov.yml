coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 70%
        threshold: 5%

ignore:
  - "examples/**"
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.config.ts"
  - "**/*.config.js"
