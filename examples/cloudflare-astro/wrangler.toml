name = "nhc-example-cloudflare-astro"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]

# main / assets は @astrojs/cloudflare アダプタが build 時に
# .wrangler/deploy/config.json を生成して引き継ぐため、ここでは指定しない。

# Workers の組み込み観測機能を有効化（ダッシュボードでログ・メトリクスを閲覧可能）
[observability]
enabled = true

# 注: ビルドコマンドは Cloudflare GitHub App / GitHub Actions 側で明示実行する運用にしている
# （wrangler.toml の [build] と Dashboard の Build command の優先順位混乱を避けるため）。
# Astro では以下の順で実行する:
#   pnpm --dir=../.. install --frozen-lockfile \
#     && pnpm --dir=../.. --filter='@notion-headless-cms/*' build \
#     && pnpm generate && pnpm build

[[kv_namespaces]]
binding = "DOC_CACHE"
id = "d949487218794cbe8e8d3cdaee119790"

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "nhc-example-cache"

# wrangler secret put NOTION_TOKEN
# KV / R2 バインディングは wrangler kv namespace create / wrangler r2 bucket create で作成する
