name = "nhc-example-cloudflare-hono"
main = "src/index.ts"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]

# Workers の組み込み観測機能を有効化（ダッシュボードでログ・メトリクスを閲覧可能）
[observability]
enabled = true

# Cloudflare GitHub App（Workers Builds）連携時に実行されるビルドコマンド。
# モノリポルートで依存インストール → ワークスペースパッケージのビルド →
# nhc generate → 各 example の build スクリプトの順に実行する。
# Hono は src/index.ts を wrangler が直接バンドルするため framework build は不要で
# pnpm build は no-op スクリプトを叩くだけだが、4 example で同じコマンドに揃えるために含める。
# - NOTION_TOKEN は Dashboard > Settings > Variables and Secrets の "Build variables" に追加。
[build]
command = "pnpm --dir=../.. install --frozen-lockfile && pnpm --dir=../.. --filter='@notion-headless-cms/*' build && pnpm generate && pnpm build"

[[kv_namespaces]]
binding = "DOC_CACHE"
id = "d949487218794cbe8e8d3cdaee119790"

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "nhc-example-cache"
preview_bucket_name = "nhc-example-cache-preview"

# シークレットは wrangler secret put で設定する
# wrangler secret put NOTION_TOKEN
# KV / R2 バインディングは wrangler kv namespace create / wrangler r2 bucket create で作成する
