name = "nhc-example-cloudflare-react-router"
main = "./workers/app.ts"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "./build/client" }

# Workers の組み込み観測機能を有効化（ダッシュボードでログ・メトリクスを閲覧可能）
[observability]
enabled = true

# モノリポのルートから依存インストール・パッケージビルド・本 example ビルドを順に実行する。
# NOTION_TOKEN はビルド時に nhc generate が Notion API へアクセスするために必要。
# Cloudflare Dashboard の Build 設定で環境変数 NOTION_TOKEN を追加すること。
[build]
command = "pnpm --dir=../.. install --frozen-lockfile && pnpm --dir=../.. --filter='@notion-headless-cms/*' build && pnpm build"

[[kv_namespaces]]
binding = "CACHE_KV"
# id はデプロイ前に追加する: wrangler kv namespace create nhc-cache
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[r2_buckets]]
binding = "CACHE_BUCKET"
bucket_name = "nhc-example-cache"
preview_bucket_name = "nhc-example-cache-preview"

# ランタイムシークレットは初回デプロイ前に以下で設定してください:
# wrangler secret put NOTION_TOKEN
# KV / R2 バインディングは wrangler kv namespace create / wrangler r2 bucket create で作成する
