name = "nhc-example-cloudflare-react-router"
main = "./workers/app.ts"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "./build/client" }

# Workers の組み込み観測機能を有効化（ダッシュボードでログ・メトリクスを閲覧可能）
[observability]
enabled = true

# Cloudflare GitHub App（Workers Builds）連携時に実行されるビルドコマンド。
# モノリポルートで依存インストール → ワークスペースパッケージのビルド →
# nhc generate（Notion から型/データ取得）→ react-router build の順に実行する。
# - NOTION_TOKEN は Cloudflare Dashboard > Settings > Variables and Secrets で
#   "Build variables" として追加する（ランタイムの secret とは別枠）。
# - GitHub Actions 経由でデプロイする場合はワークフロー側で同等の処理を行うため
#   この [build] は冪等に再実行されるが、追加コストは frozen-lockfile/turbo cache で軽減される。
[build]
command = "pnpm --dir=../.. install --frozen-lockfile && pnpm --dir=../.. --filter='@notion-headless-cms/*' build && pnpm generate && pnpm build"

[[kv_namespaces]]
binding = "DOC_CACHE"
id = "d949487218794cbe8e8d3cdaee119790"

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "nhc-example-cache"
preview_bucket_name = "nhc-example-cache-preview"

# ランタイムシークレットは初回デプロイ前に以下で設定してください:
# wrangler secret put NOTION_TOKEN
# KV / R2 バインディングは wrangler kv namespace create / wrangler r2 bucket create で作成する
