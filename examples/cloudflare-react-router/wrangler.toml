name = "nhc-example-cloudflare-react-router"
main = "./workers/app.ts"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "./build/client" }

# Workers の組み込み観測機能を有効化（ダッシュボードでログ・メトリクスを閲覧可能）
[observability]
enabled = true

# 注: Vite 経由（@cloudflare/vite-plugin）で運用するため [build] セクションは置かない。
# vite が無視する旨を warning で出力する。実際のビルドは外部から以下を実行する:
#   - Cloudflare GitHub App（Workers Builds）: Dashboard の Build command に設定
#   - GitHub Actions: .github/workflows/deploy-examples-cloudflare.yml が実行
# どちらも以下の順序で実行する:
#   pnpm --dir=../.. install --frozen-lockfile \
#     && pnpm --dir=../.. --filter='@notion-headless-cms/*' build \
#     && pnpm generate && pnpm build
# ビルド成果物の build/server/wrangler.json を wrangler deploy が読み取る。

[[kv_namespaces]]
binding = "DOC_CACHE"
id = "d949487218794cbe8e8d3cdaee119790"

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "nhc-example-cache"
preview_bucket_name = "nhc-example-cache-preview"

# ランタイムシークレットは初回デプロイ前に以下で設定してください:
# wrangler secret put NOTION_TOKEN
# KV / R2 バインディングは wrangler kv namespace create / wrangler r2 bucket create で作成する
