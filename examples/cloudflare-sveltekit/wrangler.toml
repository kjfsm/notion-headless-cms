name = "example-cloudflare-sveltekit"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".svelte-kit/cloudflare", binding = "ASSETS" }

# Workers の組み込み観測機能を有効化（ダッシュボードでログ・メトリクスを閲覧可能）
[observability]
enabled = true

[[kv_namespaces]]
binding = "CACHE_KV"
# id はデプロイ前に追加する: wrangler kv namespace create nhc-cache
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[r2_buckets]]
binding = "CACHE_BUCKET"
bucket_name = "nhc-example-cache"
preview_bucket_name = "nhc-example-cache-preview"

# wrangler secret put NOTION_TOKEN
# wrangler secret put NOTION_DATA_SOURCE_ID
# KV / R2 バインディングは wrangler kv namespace create / wrangler r2 bucket create で作成する
